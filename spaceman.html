<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Kunci paksa mobile agar tidak deteksi desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020406">
    <title>ZANS ASPACE VVIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
        
        * { touch-action: manipulation; }
        html, body { 
            width: 100% !important; 
            height: 100% !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            overflow-x: hidden !important; 
            background: #020406 !important; 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        /* Animasi Logo Login */
        .float-anim { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        /* Background Garis Bergerak Panel */
        .panel-bg {
            background-color: #000;
            background-image: linear-gradient(rgba(6, 182, 212, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: moveGrid 5s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 30px 30px; } }

        /* Toggle Bundar Neon */
        .toggle-switch { transition: 0.3s; appearance: none; }
        .toggle-switch:checked { background-color: #06b6d4 !important; box-shadow: 0 0 15px #06b6d4; }
        .toggle-switch:checked::after { transform: translateX(20px); }
        .toggle-switch::after { content: ""; position: absolute; width: 18px; height: 18px; top: 3px; left: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- LOGIN SCREEN -->
    <div id="auth-screen" class="w-full max-w-xs p-6">
        <div class="float-anim text-center mb-8">
            <div class="w-24 h-24 mx-auto bg-cyan-950 rounded-full flex items-center justify-center border-2 border-cyan-500 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                <i class="fa-solid fa-user-astronaut text-4xl text-cyan-400"></i>
            </div>
            <h1 class="cyber-font text-xl mt-4 text-white tracking-widest">ZANS ASPACE</h1>
        </div>
        
        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-700">
            <input type="text" id="key-input" placeholder="Masukkan License Key..." class="w-full bg-black/50 p-4 mb-4 text-center rounded-xl border border-slate-600 outline-none focus:border-cyan-400">
            <button onclick="login()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold hover:bg-cyan-500 transition">LOGIN SYSTEM</button>
        </div>
    </div>

    <!-- MAIN PANEL -->
    <div id="main-ui" class="hidden w-full max-w-sm p-6 space-y-6">
        <div class="p-6 rounded-3xl border border-cyan-500/50 panel-bg overflow-hidden relative">
            <h2 class="cyber-font text-lg text-cyan-400 mb-6 text-center z-10 relative">ZANS ASPACE PANEL</h2>
            
            <div class="flex justify-between items-center mb-6 border-b border-cyan-500/20 pb-4 z-10 relative">
                <span class="text-sm font-bold uppercase">Status Akun</span>
                <button id="btn-connect" onclick="connect()" class="bg-cyan-900/50 border border-cyan-400 text-cyan-400 px-4 py-1 text-[10px] font-bold rounded">CONNECT</button>
            </div>

            <div class="space-y-6 z-10 relative">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-cyan-100">Predict Winner 98,5%</span>
                    <input type="checkbox" class="toggle-switch w-11 h-6 bg-slate-700 rounded-full relative cursor-pointer">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-cyan-100">Winner Accuration 85,2%</span>
                    <input type="checkbox" class="toggle-switch w-11 h-6 bg-slate-700 rounded-full relative cursor-pointer">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-cyan-100">Auto Winner 94,9%</span>
                    <input type="checkbox" class="toggle-switch w-11 h-6 bg-slate-700 rounded-full relative cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('key-input').value === "spaceman_id-spckey10865355-id736365") {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }

        function connect() {
            const btn = document.getElementById('btn-connect');
            btn.innerText = "SYNCING...";
            setTimeout(() => {
                btn.innerText = "ACTIVE";
                btn.classList.add('bg-cyan-500', 'text-black');
            }, 2000);
        }
    </script>
</body>
</html>
